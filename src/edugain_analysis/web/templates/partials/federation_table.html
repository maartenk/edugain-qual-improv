<figure>
    <table>
        <thead>
            <tr>
                <th>Federation</th>
                <th>Entities</th>
                <th>SPs</th>
                <th>Privacy Coverage</th>
                <th></th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for fed in federations %}
            <tr>
                <td>
                    <a href="/federations/{{ fed.name }}"><strong>{{ fed.name }}</strong></a>
                </td>
                <td>{{ "{:,}".format(fed.total_entities) }}</td>
                <td>{{ "{:,}".format(fed.total_sps) }}</td>
                <td>
                    <progress value="{{ fed.coverage_pct }}" max="100"></progress>
                </td>
                <td>
                    <small class="{% if fed.coverage_pct >= 80 %}coverage-high{% elif fed.coverage_pct >= 50 %}coverage-medium{% else %}coverage-low{% endif %}">
                        {{ "%.1f"|format(fed.coverage_pct) }}%
                    </small>
                </td>
                <td>
                    <a href="/federations/{{ fed.name }}" role="button" class="outline secondary" style="font-size: 0.8em; padding: 0.25rem 0.5rem; margin: 0;">View Details</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>
